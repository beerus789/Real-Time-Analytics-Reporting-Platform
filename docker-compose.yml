services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./apps/api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TEST_DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics_test
    command: sh -c "alembic upgrade head && uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  celery-worker:
    build:
      context: ./apps/api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TEST_DATABASE_URL: postgresql+asyncpg://analytics:analytics@postgres:5432/analytics_test
    command: celery -A app.core.celery_app.celery_app worker --loglevel=INFO -Q ingestion
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000/api/v1
      NEXT_PUBLIC_API_URL: /api/backend
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres-data:
  redis-data:
